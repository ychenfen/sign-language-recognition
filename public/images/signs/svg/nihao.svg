<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE0BD"/>
      <stop offset="100%" style="stop-color:#FFCBA4"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="200" height="200" fill="#f0f4ff" rx="20"/>
  <!-- 手掌 -->
  <ellipse cx="100" cy="130" rx="35" ry="40" fill="url(#skinGrad)" stroke="#e0b090" stroke-width="2"/>
  <!-- 大拇指竖起 -->
  <path d="M65 130 Q50 100, 55 60 Q58 45, 70 50 Q82 55, 78 75 Q75 100, 75 120" fill="url(#skinGrad)" stroke="#e0b090" stroke-width="2"/>
  <!-- 其他手指握拳 -->
  <ellipse cx="90" cy="95" rx="12" ry="8" fill="url(#skinGrad)" stroke="#e0b090" stroke-width="1"/>
  <ellipse cx="105" cy="92" rx="12" ry="8" fill="url(#skinGrad)" stroke="#e0b090" stroke-width="1"/>
  <ellipse cx="118" cy="95" rx="11" ry="7" fill="url(#skinGrad)" stroke="#e0b090" stroke-width="1"/>
  <ellipse cx="128" cy="102" rx="10" ry="6" fill="url(#skinGrad)" stroke="#e0b090" stroke-width="1"/>
  <!-- 文字 -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="14" fill="#667eea" font-weight="bold">你好</text>
</svg>
